# Example: Python microservice pipeline
# Copy to your project root as .gitlab-ci.yml and adjust variables.

include:
  - project: 'your-group/neglected'
    ref: main
    file:
      - gitlab-ci/templates/.build.gitlab-ci.yml
      - gitlab-ci/templates/.test.gitlab-ci.yml
      - gitlab-ci/templates/.deploy.gitlab-ci.yml
      - gitlab-ci/templates/.notify.gitlab-ci.yml

stages:
  - test
  - build
  - deploy
  - .post

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

lint:
  extends: .test:lint:python
  image: python:3.12-slim

unit-test:
  extends: .test:unit:python
  image: python:3.12-slim

security-scan:
  extends: .test:security:trivy
  needs:
    - build

build:
  extends: .build:kaniko

deploy-staging:
  extends: .deploy:helm:staging
  variables:
    HELM_CHART: ./helm/my-service
    HELM_RELEASE: my-service-staging

deploy-production:
  extends: .deploy:helm:production
  variables:
    HELM_CHART: ./helm/my-service
    HELM_RELEASE: my-service

notify-success:
  extends: .notify:slack:success
  variables:
    SLACK_CHANNEL: "#deployments"

notify-failure:
  extends: .notify:slack:failure
  variables:
    SLACK_CHANNEL: "#alerts"
