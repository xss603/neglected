apiVersion: v1
kind: Namespace
metadata:
  name: minio
---
# ── MinIO instance 1 ────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio1-pvc
  namespace: minio
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio1
  namespace: minio
  labels:
    app: minio1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio1
  template:
    metadata:
      labels:
        app: minio1
    spec:
      tolerations:
        - key: zone
          operator: Equal
          value: local
          effect: NoSchedule
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args: [server, /data, --console-address, ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: minio1admin
            - name: MINIO_ROOT_PASSWORD
              value: minio1secret
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio1-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio1
  namespace: minio
spec:
  selector:
    app: minio1
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
