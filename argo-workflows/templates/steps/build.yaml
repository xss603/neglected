apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: docker-build
  namespace: argo
  labels:
    app.kubernetes.io/part-of: cicd-libs
spec:
  templates:
    - name: docker-build
      inputs:
        parameters:
          - name: image
          - name: tag
            value: latest
          - name: context
            value: "."
          - name: dockerfile
            value: Dockerfile
        artifacts:
          - name: source
            path: /workspace
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - --context=/workspace/{{inputs.parameters.context}}
          - --dockerfile=/workspace/{{inputs.parameters.dockerfile}}
          - --destination={{inputs.parameters.image}}:{{inputs.parameters.tag}}
          - --cache=true
          - --cache-ttl=24h
        volumeMounts:
          - name: docker-config
            mountPath: /kaniko/.docker
      volumes:
        - name: docker-config
          secret:
            secretName: docker-registry-secret
            items:
              - key: .dockerconfigjson
                path: config.json

    - name: docker-build-push-multi
      inputs:
        parameters:
          - name: image
          - name: tags
            value: "latest"
          - name: context
            value: "."
          - name: platforms
            value: "linux/amd64,linux/arm64"
        artifacts:
          - name: source
            path: /workspace
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - --context=/workspace/{{inputs.parameters.context}}
          - --destination={{inputs.parameters.image}}:{{inputs.parameters.tags}}
          - --cache=true
          - --custom-platform={{inputs.parameters.platforms}}
        volumeMounts:
          - name: docker-config
            mountPath: /kaniko/.docker
      volumes:
        - name: docker-config
          secret:
            secretName: docker-registry-secret
            items:
              - key: .dockerconfigjson
                path: config.json
