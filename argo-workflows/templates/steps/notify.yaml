apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: notify
  namespace: argo
  labels:
    app.kubernetes.io/part-of: cicd-libs
spec:
  templates:
    - name: slack
      inputs:
        parameters:
          - name: channel
          - name: message
          - name: status
            value: success
      container:
        image: curlimages/curl:latest
        command: [sh, -c]
        args:
          - |
            EMOJI=":white_check_mark:"
            [ "{{inputs.parameters.status}}" = "failure" ] && EMOJI=":x:"
            curl -s -X POST \
              -H "Content-type: application/json" \
              -H "Authorization: Bearer $(SLACK_TOKEN)" \
              --data "{\"channel\":\"{{inputs.parameters.channel}}\",\"text\":\"${EMOJI} {{inputs.parameters.message}}\"}" \
              https://slack.com/api/chat.postMessage
        env:
          - name: SLACK_TOKEN
            valueFrom:
              secretKeyRef:
                name: slack-secret
                key: token

    - name: github-status
      inputs:
        parameters:
          - name: repo
          - name: sha
          - name: state
            value: success
          - name: context
            value: "argo-workflow"
          - name: description
            value: ""
      container:
        image: curlimages/curl:latest
        command: [sh, -c]
        args:
          - |
            curl -s -X POST \
              -H "Authorization: token $(GITHUB_TOKEN)" \
              -H "Accept: application/vnd.github+json" \
              --data "{\"state\":\"{{inputs.parameters.state}}\",\"context\":\"{{inputs.parameters.context}}\",\"description\":\"{{inputs.parameters.description}}\"}" \
              "https://api.github.com/repos/{{inputs.parameters.repo}}/statuses/{{inputs.parameters.sha}}"
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-secret
                key: token
