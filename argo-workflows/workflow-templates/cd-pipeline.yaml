apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cd-pipeline
  namespace: argo
  labels:
    app.kubernetes.io/part-of: cicd-libs
    pipeline-type: cd
spec:
  entrypoint: cd
  arguments:
    parameters:
      - name: image
      - name: tag
      - name: release-name
      - name: chart
      - name: namespace
        value: default
      - name: values-file
        value: values.yaml
      - name: environment
        value: staging
      - name: slack-channel
        value: "#deployments"

  templates:
    - name: cd
      dag:
        tasks:
          - name: deploy
            templateRef:
              name: deploy
              template: helm-upgrade
            arguments:
              parameters:
                - name: release-name
                  value: "{{workflow.parameters.release-name}}"
                - name: chart
                  value: "{{workflow.parameters.chart}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"
                - name: values-file
                  value: "{{workflow.parameters.values-file}}"
                - name: set-args
                  value: "--set image.tag={{workflow.parameters.tag}}"

          - name: smoke-test
            depends: deploy
            template: smoke-test
            arguments:
              parameters:
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"
                - name: release-name
                  value: "{{workflow.parameters.release-name}}"

          - name: rollback-on-failure
            depends: smoke-test.Failed
            templateRef:
              name: deploy
              template: rollback
            arguments:
              parameters:
                - name: release-name
                  value: "{{workflow.parameters.release-name}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"

          - name: notify-success
            depends: smoke-test
            templateRef:
              name: notify
              template: slack
            arguments:
              parameters:
                - name: channel
                  value: "{{workflow.parameters.slack-channel}}"
                - name: message
                  value: "Deployed {{workflow.parameters.release-name}}:{{workflow.parameters.tag}} to {{workflow.parameters.environment}}"
                - name: status
                  value: success

          - name: notify-failure
            depends: rollback-on-failure
            templateRef:
              name: notify
              template: slack
            arguments:
              parameters:
                - name: channel
                  value: "{{workflow.parameters.slack-channel}}"
                - name: message
                  value: "Deploy failed for {{workflow.parameters.release-name}} — rolled back"
                - name: status
                  value: failure

    - name: smoke-test
      inputs:
        parameters:
          - name: namespace
          - name: release-name
      container:
        image: curlimages/curl:latest
        command: [sh, -c]
        args:
          - |
            kubectl rollout status deployment/{{inputs.parameters.release-name}} \
              -n {{inputs.parameters.namespace}} \
              --timeout=120s
