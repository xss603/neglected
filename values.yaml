# values.yaml — single source of truth for the grafana-stack Timoni module.
#
# Use the provided wrapper which converts YAML → CUE on the fly
# (timoni v0.26 has a known bug with YAML --values, CUE is always used internally):
#
#   ./timoni.sh build grafana-stack ./modules/stack --output yaml
#   ./timoni.sh apply grafana-stack ./modules/stack
#
# To use a custom values file:
#   VALUES=my-overrides.yaml ./timoni.sh apply grafana-stack ./modules/stack

# ── Global ─────────────────────────────────────────────────────────────────────
toleration:
  key: zone
  operator: Equal
  value: local
  effect: NoSchedule

# ── Monitoring (kube-prometheus-stack ingress + Grafana dashboards) ────────────
monitoring:
  enabled: true
  namespace: monitoring
  helmRelease: kube-prom   # must match the Helm release name used in install.sh

  ingress:
    enabled: true
    className: nginx
    annotations: {}        # extra nginx annotations, e.g. auth, rate-limit

  grafana:
    host: grafana.local
    servicePort: 80

  prometheus:
    host: prometheus.local
    servicePort: 9090

  alertmanager:
    host: alertmanager.local
    servicePort: 9093

  dashboards:
    enabled: true
    sidecarLabel: grafana_dashboard
    sidecarValue: "1"

  # Forwarded verbatim to helm upgrade --set / --values by install.sh
  helm:
    grafanaAdminPassword: admin
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# ── MinIO (dual instance + optional migration) ────────────────────────────────
minio:
  enabled: true
  namespace: minio

  instance1:
    name: minio1
    rootUser: minio1admin
    rootPassword: minio1secret
    storage: 2Gi
    apiPort: 9000
    consolePort: 9001
    buckets: [logs, configs, backups]

  instance2:
    name: minio2
    rootUser: minio2admin
    rootPassword: minio2secret
    storage: 2Gi
    apiPort: 9000
    consolePort: 9001
    buckets: [logs, configs, backups]

  migrate:
    # Flip to true to emit the migration Job (mc mirror instance1 → instance2).
    enabled: false
    image: minio/mc:latest
    bucketPairs:
      - [logs,    logs]
      - [configs, configs]
      - [backups, backups]
